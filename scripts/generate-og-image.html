<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      display: flex;
      align-items: center;
      gap: 60px;
    }
    .logo {
      width: 280px;
      height: 280px;
      object-fit: contain;
    }
    .text {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .title {
      font-size: 72px;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -2px;
    }
    .subtitle {
      font-size: 32px;
      font-weight: 500;
      color: #64748b;
    }
    .tagline {
      font-size: 20px;
      font-style: italic;
      color: #94a3b8;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Logo" class="logo">
    <div class="text">
      <div class="title">Goat Beard Governors</div>
      <div class="subtitle">Governors' Transgression Tracker</div>
      <div class="tagline">"A goat's beard is as worthless as a state's governor."</div>
    </div>
  </div>
</body>
</html>
